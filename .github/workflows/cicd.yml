name: Production AI Pipeline CI/CD Mesh

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Setup Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Linting Tools
        run: pip install flake8

      - name: Run Code Quality Checks
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Verify Docker Compose Configuration Syntax
        run: docker compose config

  build-and-push-images:
    needs: validate-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Authenticate to Docker Hub Cloud Engine
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx Builder
        uses: docker/setup-buildx-action@v3

      - name: Compile and Export Training Pipeline Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: pipeline/Dockerfile.pipeline
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-training-pipeline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compile and Export Inference Web API Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile.server
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-inference-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  local-mesh-smoke-test:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Initialize Local Multi-Container Mesh Infrastructure
        run: docker compose up -d --build

      - name: Validate Container Health Statuses
        run: |
          sleep 15
          docker compose ps
          
      - name: Clean Down Local Sandbox Running Elements
        run: docker compose down -v
